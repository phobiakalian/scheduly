name: Build Android APK

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Download Valid Gradle Wrapper JAR
        run: |
          cd android/gradle/wrapper
          echo "⬇️ Downloading official gradle-wrapper.jar (~60KB)..."
          curl -L -o gradle-wrapper.jar "https://raw.githubusercontent.com/gradle/gradle/v8.3.0/gradle/wrapper/gradle-wrapper.jar" \
            --retry 3 --retry-delay 2 --connect-timeout 10
          
          # Verifikasi size
          SIZE=$(stat -c%s gradle-wrapper.jar 2>/dev/null || stat -f%z gradle-wrapper.jar)
          if [ "$SIZE" -lt 10000 ]; then
            echo "❌ Download failed or file too small. Fallback to services.gradle.org..."
            curl -L -o gradle-8.3-bin.zip "https://services.gradle.org/distributions/gradle-8.3-bin.zip"
            unzip -j gradle-8.3-bin.zip "gradle-8.3/lib/gradle-wrapper-*.jar" -d .
            mv gradle-wrapper-*.jar gradle-wrapper.jar 2>/dev/null || true
            rm -f gradle-8.3-bin.zip
          fi
          echo "✅ gradle-wrapper.jar ready ($(ls -lh gradle-wrapper.jar | awk '{print $5}'))"

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          bash ./gradlew assembleRelease --no-daemon
        env:
          JAVA_HOME: ${{ env.JAVA_HOME }}
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: scheduly-apk
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 7

      - name: Create Release (on main branch push)
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          tag_name: v${{ github.run_number }}
          name: "SCHEDULY v${{ github.run_number }}"
          body: |
            🚀 Auto-built APK from commit ${{ github.sha }}
            
            ### Cara Install:
            1. Download file `app-release.apk` di bawah
            2. Transfer ke HP Android
            3. Install (aktifkan "Install from unknown sources" jika perlu)
        env:
          GITHUB_TOKEN: ${{ secrets.PITHUB_TOKEN }}
